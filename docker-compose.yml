services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-wallet_db}
      POSTGRES_USER:     ${DB_USER:-wallet_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wallet_pass}
    ports:
      # Host-side port only (for optional external psql/DBeaver access) — the app talks to
      # `db:5432` over the internal compose network regardless of this mapping. Default 5433,
      # not 5432, because 5432 is the single most common port to already be taken by a locally
      # installed Postgres — colliding there is the #1 reason "docker compose up" fails to start
      # on a reviewer's machine with zero explanation.
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      # $$VAR is docker-compose escape for $VAR — resolved inside the container
      # where POSTGRES_USER / POSTGRES_DB are already set by the image.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/${DB_NAME:-wallet_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-wallet_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-wallet_pass}
      # Activates the "prod" logback-spring.xml profile → JSON log output on stdout.
      # `docker compose logs -f app` then streams one JSON object per line.
      SPRING_PROFILES_ACTIVE:     prod
    depends_on:
      db:
        condition: service_healthy   # app starts only after postgres accepts connections
    restart: on-failure

volumes:
  pg_data: