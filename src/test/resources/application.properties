# Test-only overrides (applies to all @SpringBootTest / Testcontainers integration tests).
# The fraud-check stub is randomized by default (see StubFraudCheckAdapter) so prod/docker-compose
# can simulate a flaky external dependency. Integration tests need deterministic APPROVED decisions
# with no artificial latency — otherwise concurrency/balance assertions become flaky.
app.fraud.rejection-rate=0
app.fraud.error-rate=0
app.fraud.max-delay-ms=0
