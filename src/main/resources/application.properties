spring.application.name=transfer_money

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/wallet_db
spring.datasource.username=wallet_user
spring.datasource.password=wallet_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP: a thread blocked on SELECT FOR UPDATE holds its JDBC connection for the entire wait,
# not just for its own query — so under pessimistic-lock contention on one hot wallet, pool size
# must exceed the expected peak concurrent-transfer burst against that single wallet, not just
# follow the generic default of 10. 30 comfortably covers this project's heaviest concurrency
# test (20 simultaneous transfers against one wallet) with headroom.
spring.datasource.hikari.maximum-pool-size=30

# JPA — never auto-create schema; Flyway owns migrations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson — Instant already serializes as ISO 8601 by default (jackson-datatype-jsr310
# auto-registered by Spring Boot). The explicit spring.jackson.serialization.* Map-key property
# to disable WRITE_DATES_AS_TIMESTAMPS does not bind under Jackson 3's relaxed-binding rules
# (Spring Boot 4 / tools.jackson) — safe to omit since the default already gives ISO 8601.

# SpringDoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging — config lives in logback-spring.xml (profiles: default=text, prod=JSON).
# Only override log levels here if you need temporary debug output locally.
# logging.level.commonlib.transfer_money=DEBUG

# Transfer path tunables — see ResilientFraudCheckAdapter / OutboxPoller for defaults and
# rationale. Uncomment to override:
# app.fraud.rejection-rate=0.10
# app.fraud.error-rate=0.05
# app.fraud.max-delay-ms=300
# app.outbox.poll-interval-ms=5000
