spring.application.name=transfer_money

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/wallet_db
spring.datasource.username=wallet_user
spring.datasource.password=wallet_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — never auto-create schema; Flyway owns migrations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson — Instant already serializes as ISO 8601 by default (jackson-datatype-jsr310
# auto-registered by Spring Boot). The explicit spring.jackson.serialization.* Map-key property
# to disable WRITE_DATES_AS_TIMESTAMPS does not bind under Jackson 3's relaxed-binding rules
# (Spring Boot 4 / tools.jackson) — safe to omit since the default already gives ISO 8601.

# SpringDoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging — config lives in logback-spring.xml (profiles: default=text, prod=JSON).
# Only override log levels here if you need temporary debug output locally.
# logging.level.commonlib.transfer_money=DEBUG
